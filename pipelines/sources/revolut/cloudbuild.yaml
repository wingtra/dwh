substitutions:
  _IMAGE: europe-west1-docker.pkg.dev/wingtra-dwh/finance-pipelines/revolut-raw-loader:latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

images:
  - ${_IMAGE}
