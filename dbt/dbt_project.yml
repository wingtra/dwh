name: wingtra_dwh
version: "1.0.0"
config-version: 2

profile: wingtra_dwh

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: target
log-path: logs

clean-targets:
  - target
  - dbt_packages
  - logs

seeds:
  wingtra_dwh:
    +schema: seeds
    +tags: ["weekly", "finance"]
    arr_fx_daily_rates_seed:
      +schema: seeds_revops
      +tags: ["daily", "revops"]
      +column_types:
        rate_date: DATE
        eur_to_usd: FLOAT64
        chf_to_usd: FLOAT64
    arr_accrual_rules_seed:
      +schema: seeds_revops
      +tags: ["daily", "revops"]
      +column_types:
        product: STRING
        hubspot_object: STRING
        commission_trigger: STRING
        arr_accrual_rule: STRING
        is_in_arr: BOOLEAN
    arr_sheet_baseline_licences_2026_07_03:
      +schema: seeds_revops
      +tags: ["daily", "revops"]
      +column_types:
        licence_id: STRING
        license_type_label: STRING
        amount_source: FLOAT64
        deal_currency_code: STRING
        warranty_service_start_date: DATE
        warranty_service_expiration_date: DATE
        license_type_detail: STRING
    arr_sheet_baseline_matrix_2026_07_03:
      +schema: seeds_revops
      +tags: ["daily", "revops"]
      +column_types:
        month_date: DATE
        license_type_label: STRING
        monthly_recognized_rr_usd: FLOAT64
    claude_seat_usage_2026_05:
      +column_types:
        user_email: STRING
        account_uuid: STRING
        product: STRING
        model: STRING
        total_requests: INT64
        total_prompt_tokens: INT64
        total_completion_tokens: INT64
        total_net_spend_usd: FLOAT64
        total_gross_spend_usd: FLOAT64
        user_id: STRING
        total_uncached_input_tokens: INT64
        total_cache_read_tokens: INT64
        total_cache_write_5m_tokens: INT64
        total_cache_write_1h_tokens: INT64
        total_web_search_count: INT64
        report_period_start: DATE
        report_period_end: DATE
    claude_members_2026_06_18:
      +column_types:
        member_name: STRING
        user_email: STRING
        member_role: STRING
        member_status: STRING
        seat_tier: STRING
        export_date: DATE
    claude_members_2026_06_23:
      +column_types:
        member_name: STRING
        user_email: STRING
        member_role: STRING
        member_status: STRING
        seat_tier: STRING
        export_date: DATE

models:
  wingtra_dwh:
    clean:
      +materialized: view
      +schema: cl
      external:
        +schema: cl_external
        +tags: ["daily", "ops"]
      odoo:
        +schema: cl_odoo
        +tags: ["daily", "odoo", "ops"]
      revolut:
        +schema: cl_revolut
        +tags: ["weekly", "finance"]
      hubspot:
        +schema: cl_hubspot
        +tags: ["daily", "hubspot", "revops"]
      seeds:
        +schema: cl_seeds
        +tags: ["weekly", "finance"]
    object:
      +materialized: table
      +schema: ol
      ops:
        +schema: ol_ops
        +tags: ["daily", "odoo", "ops"]
      finance:
        +schema: ol_finance
        +tags: ["weekly", "finance"]
      revops:
        +schema: ol_revops
        +tags: ["daily", "hubspot", "revops"]
    business:
      +materialized: table
      +schema: bl
      ops:
        +schema: bl_ops
        +tags: ["daily", "odoo", "ops"]
      finance:
        +schema: bl_finance
        +tags: ["weekly", "finance"]
      revops:
        +schema: bl_revops
        +tags: ["daily", "hubspot", "revops"]
    integration:
      +materialized: view
      +schema: il_ops
      +tags: ["daily", "odoo", "ops"]
      revops:
        +schema: il_revops
        +tags: ["daily", "hubspot", "revops"]
    metadata:
      +materialized: view
      +schema: meta
