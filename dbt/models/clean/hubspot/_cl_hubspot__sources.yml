version: 2

sources:
  - name: hubspot
    database: "{{ env_var('GCP_PROJECT', 'wingtra-dwh') }}"
    schema: dl_hubspot
    description: Raw HubSpot current mirror tables produced by the HubSpot source loader.
    tables:
      - name: contacts
        description: Current raw HubSpot contacts mirror. Historical extracts are in `contacts_extracts`.
        columns:
          - name: object_id
            tests:
              - not_null
              - unique
          - name: _dlt_deleted_at
      - name: companies
      - name: deals
      - name: tickets
      - name: products
      - name: line_items
      - name: quotes
      - name: association_edges
      - name: licences
        description: >
          Custom object "Licence" (objectTypeId 2-1022441), one record per
          license sold/activated. Source of the RevOps "[Accruals] ARR: Raw
          Data" report. Carries the revenue-recognition window
          (warranty_service_start_date -> expiration_date) and the recurring
          revenue amount, which is in DEAL currency for EUR/CHF licences
          despite the property label saying "(USD)".
        loaded_at_field: loaded_at
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 72, period: hour}
        columns:
          - name: object_id
            tests:
              - not_null
              - unique
          - name: _dlt_deleted_at
      - name: commissions
        description: >
          Custom object "Commissions" (objectTypeId 2-53702763): one record
          per RevOps-reviewed commissionable item (drone/payload/license) with
          a manual Confirmed/Declined/Pending status and USD sku_revenue. The
          eligibility layer behind the "Monthly NRR vs. RR" sheet.
        columns:
          - name: object_id
            tests:
              - not_null
              - unique
          - name: _dlt_deleted_at

models:
  - name: cl_hubspot__contacts
    description: Typed clean contacts from the HubSpot current mirror.
    columns:
      - name: contact_id
        tests:
          - not_null
          - unique
  - name: cl_hubspot__deals
    description: Typed clean deals from the HubSpot current mirror. One row per non-deleted deal; amounts in deal currency.
    columns:
      - name: deal_id
        tests: [not_null, unique]
  - name: cl_hubspot__line_items
    description: Typed clean line items from the HubSpot current mirror. One row per non-deleted line item; amounts in line-item currency.
    columns:
      - name: line_item_id
        tests: [not_null, unique]
  - name: cl_hubspot__licences
    description: >
      Typed clean licences from the HubSpot current mirror. One row per
      non-deleted licence record. Maps the Type enum value "Blue Licence" to
      its UI label "WingtraPilot BLU" (licence_type_label) and exposes the
      recurring revenue amount in its source deal currency
      (recurring_revenue_amount_source + recurring_revenue_currency) because
      the HubSpot property is mislabeled "(USD)".
    columns:
      - name: licence_id
        tests:
          - not_null
          - unique
      - name: licence_type_label
        description: UI label for the licence type ("Blue Licence" mapped to "WingtraPilot BLU").
      - name: recurring_revenue_amount_source
        description: Recurring revenue amount in recurring_revenue_currency (deal currency; NOT reliably USD).
      - name: recurring_revenue_currency
        description: Deal currency code (USD/EUR/CHF); NULL means unknown, sheet logic falls back to unconverted 30.44-day rounding.
  - name: cl_hubspot__commissions
    description: >
      Typed clean commissions from the HubSpot current mirror. One row per
      non-deleted commission record; restricted to year = 2026 (documented
      project policy — see model SQL header and AGENTS.md Clean Layer). The
      Confirmed/sku_revenue eligibility logic is only valid 2026 forward.
    columns:
      - name: commission_id
        tests: [not_null, unique]
      - name: object_type
        description: Drone | License | Payload.
      - name: status
        description: Confirmed | Declined | Pending.
      - name: sku_revenue
        description: USD revenue credited (0 for Declined/Pending).
