      - name: machine_cost_raw
        description: Raw JSON per-company machine-cost component.
        config:
          meta:
            status: unused
            status_reason: Machine-cost component never used (0/2,703).
      - name: last_machine_cost_raw
        description: Raw JSON per-company snapshot of the previous machine-cost component.
        config:
          meta:
            status: unused
            status_reason: Machine-cost snapshot never used (0/2,703).
      - name: report_machine_cost_raw
        description: Raw JSON per-company computed/reported machine cost value.
        config:
          meta:
            status: unused
            status_reason: Machine-cost reported value never used (0/2,703).
      - name: list_price
        description: Default sales list price in the company currency (CHF for AG). Customer-facing.
      - name: volume
        description: Declared product volume in the system volume UoM (typically m³). Sparse.
      - name: weight
        description: Declared product weight in the system weight UoM (typically kg). Sparse.
      - name: sale_delay
        description: Customer lead time in days quoted on sales orders.
      - name: length
        description: Physical length dimension. Unit is implementation-specific (likely m).
      - name: width
        description: Physical width dimension.
      - name: height
        description: Physical height dimension.
      - name: net_weight
        description: Net weight excluding packaging. Sparse.
      - name: x_studio_monetary_field_wo_o25
        description: Wingtra studio custom monetary field. Purpose not documented; check with finance before using.
      - name: x_studio_foc_price
        description: Wingtra studio free-of-charge price field used for samples / warranty.
      - name: internal_logistic_batch_size
        description: Batch size for internal logistics grouping (Wingtra-specific).
      - name: internal_logistic_batch_size_after_manufacturing
        description: Post-MO batch size for internal logistics grouping.

  - name: product_category
    description: |
      Cleaned Odoo product category hierarchy. One row per category. Categories are shared across all Odoo companies (no `company_id` column on the source). Per-company accounting/valuation settings live in the `property_*` JSON columns, keyed by company id. After upstream CEE template filtering, categories that exist purely for CEE (e.g. `ALL / Expenses`, `ALL / Deliveries`) remain in this dimension but are orphaned (nothing references them).
    columns:
      - name: product_category_id
        description: Primary key (Odoo `product_category.id`).
        tests: [not_null, unique]
      - name: parent_product_category_id
        description: Self-FK to the parent category. NULL for top-level categories.
      - name: created_by_user_id
        description: FK to res_users. Odoo `create_uid`.
      - name: updated_by_user_id
        description: FK to res_users. Odoo `write_uid`.
      - name: removal_strategy_id
        description: FK to the stock removal strategy (FIFO / LIFO / FEFO / Closest Location). Sparse.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60). No category overrides Odoo's default removal strategy.
      - name: created_at
        description: Category creation timestamp (Odoo `create_date`).
      - name: updated_at
        description: Category last-write timestamp (Odoo `write_date`).
      - name: category_name
        description: Leaf-level category name (Odoo `name`). Plain string.
      - name: category_full_path
        description: Full slash-separated category path (Odoo `complete_name`), e.g. `ALL / GEN2 / Manufacturable / Drones & spare parts`. Convenience for reporting.
      - name: parent_path
        description: Odoo materialised-path hierarchy string, e.g. `1/68/72/`. Useful for ancestor queries via `LIKE`.
      - name: packaging_reserve_method
        description: Strategy for reserving packaging stock. Odoo internal enum.
      - name: allows_negative_stock
        description: When TRUE, products in this category may go below zero on-hand. Audit / valuation flag.
      - name: product_properties_definition_raw
        description: Raw JSON schema defining custom per-product property fields available for products in this category. Sparse.
        config:
          meta:
            status: stale
            status_reason: Effectively empty (1/60). Per-category custom-property schema never set up at Wingtra.
      - name: stock_valuation_account_property_raw
        description: Raw JSON of per-company default valuation account ids, keyed by company id. Used for stock-value postings.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60). Chart-of-Accounts defaults apply.
      - name: stock_account_output_category_property_raw
        description: Raw JSON of per-company stock-output account ids. Outbound stock postings on shipment.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: cost_method_property_raw
        description: Raw JSON of per-company cost method (`average` / `standard` / `fifo`). All active AG categories are currently `average`.
      - name: cost_method_ag
        description: Extracted cost method for company_id=1 (Wingtra AG). Always `average` on current data.
      - name: account_expense_category_property_raw
        description: Raw JSON of per-company expense account ids used for product costing on sale.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: valuation_property_raw
        description: Raw JSON of per-company valuation mode (`manual_periodic` or `real_time`). Drives whether Odoo posts stock moves to the GL automatically.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60). Odoo defaults to `manual_periodic`.
      - name: valuation_ag
        description: Extracted valuation mode for company_id=1 (Wingtra AG).
        config:
          meta:
            status: unused
            status_reason: Always NULL because the underlying `valuation_property_raw` is never populated.
      - name: account_income_category_property_raw
        description: Raw JSON of per-company income account ids used on sales postings.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: stock_account_input_category_property_raw
        description: Raw JSON of per-company stock-input account ids. Inbound stock postings on receipt.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: stock_journal_property_raw
        description: Raw JSON of per-company stock journal ids used for valuation entries.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: stock_account_production_cost_property_raw
        description: Raw JSON of per-company manufacturing-cost account ids. Used when a BOM is produced.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: account_creditor_price_difference_category_property_raw
        description: Raw JSON of per-company price-difference account ids (PO vendor bill mismatch postings).
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: account_downpayment_category_property_raw
        description: Raw JSON of per-company downpayment account ids used on sales prepayments.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60).
      - name: hs_code_property_raw
        description: Raw JSON of per-company default HS commodity code for this category. Overridden at template level.
        config:
          meta:
            status: unused
            status_reason: Never populated (0/60). Use template-level `hs_code_id` instead.
      - name: restricts_global_discount
        description: When TRUE, the category-level setting prevents global sales discounts from applying to its products.
        config:
          meta:
            status: unused
            status_reason: Never set (0/60).

  - name: product_supplierinfo
    description: Cleaned Odoo product supplier info. One row per product/vendor combination; drives primary-supplier lookup, lead time, and MOQ.
    columns:
      - name: product_supplierinfo_id
        tests: [not_null, unique]
      - name: product_template_id
        description: FK to product_template (product master). Most supplier records are scoped at the template level.
      - name: partner_id
        description: FK to res_partner. The vendor.
      - name: lead_time_days
        description: Vendor-promised lead time in days (Odoo delay column).

  - name: purchase_order
    description: |
      Cleaned Odoo purchase order headers (covers both RFQ-stage drafts and confirmed POs).
    columns:
      - name: purchase_order_id
        tests: [not_null, unique]
      - name: purchase_order_state
        description: PO state. Typical values include draft, sent, to approve, purchase, done, cancel.
      - name: vendor_partner_id
        description: FK to res_partner. The supplier on the PO.

  - name: purchase_order_line
    description: |
      Cleaned Odoo purchase order lines. One row per product per PO; drives material security and PO-progress KPIs.
    columns:
      - name: purchase_order_line_id
        tests: [not_null, unique]
      - name: purchase_order_id
        description: FK to purchase_order header.
      - name: qty_received
        description: Cumulative quantity received against this line.

  - name: res_partner
    description: Cleaned Odoo partners (customers, vendors, contacts, internal user partners). supplier_rank or customer_rank > 0 flags vendors/customers respectively.
    columns:
      - name: partner_id
        tests: [not_null, unique]
      - name: partner_name
        description: Partner display name. On res_partner this is a regular STRING column (unlike product.name which is translation JSON).
      - name: supplier_rank
        description: Greater than 0 indicates the partner is used as a vendor.

  - name: res_users
    description: Cleaned Odoo internal users. Note that the display name lives on res_partner via partner_id, not on res_users directly.
    columns:
      - name: user_id
        tests: [not_null, unique]
      - name: partner_id
        description: FK to res_partner. Join here to resolve the user's display name and contact details.
      - name: login
        description: Login identifier (usually the email).

  - name: mrp_bom
    description: Cleaned Odoo manufacturing Bill of Materials header. One row per BOM linked to a product template (and optionally a specific variant).
    columns:
      - name: bom_id
        tests: [not_null, unique]
      - name: product_template_id
        description: FK to product_template that this BOM produces.
      - name: bom_type
        description: BOM type. Typical values include normal (manufacturing), phantom (kit), subcontract.

  - name: mrp_bom_line
    description: Cleaned Odoo manufacturing BOM lines. Components consumed to produce one unit of the parent BOM's product.
    columns:
      - name: bom_line_id
        tests: [not_null, unique]
      - name: bom_id
        description: FK to the parent mrp_bom header.
      - name: product_id
        description: FK to product_product. The component variant consumed.

  - name: uom_uom
    description: Cleaned Odoo units of measure.
    columns:
      - name: uom_id
        tests: [not_null, unique]

  - name: wt_product_expert
    description: |
      Wingtra custom expert master. One row per product expert — the people referenced by `product_template.expert_id`.
      Distinct from `res_users`: experts are subject-matter people attached to products, not Odoo system users.
      Critical for correct expert-name resolution downstream — `expert_id` is m2o to this table, NOT `res_users`.
    columns:
      - name: expert_id
        description: Primary key. Odoo `wt_product_expert.id`. Same numeric id space as `res_users` by coincidence; the two are unrelated.
        tests: [not_null, unique]
      - name: expert_name
        description: Display name (plain string, not JSON).

  - name: res_currency
    description: Cleaned Odoo currencies. One row per currency; `currency_code` is the ISO 4217 code (CHF, EUR, USD, ...).
    columns:
      - name: currency_id
        description: Primary key. Odoo `res_currency.id`.
        tests: [not_null, unique]
      - name: currency_code
        description: ISO 4217 code. Rename of Odoo `name`.
        tests: [not_null]
      - name: is_active
        description: Only active currencies are usable in Odoo; inactive rows kept for historical orders.

  - name: res_currency_rate
    description: |
      Cleaned Odoo daily currency rates per company. One row per (currency, company, rate_date).
      Odoo convention: `rate` = foreign currency units per 1 unit of the company currency
      (company 1 = Wingtra AG = CHF), so foreign -> CHF conversion DIVIDES by the rate.
    columns:
      - name: currency_rate_id
        tests: [not_null, unique]
      - name: currency_id
        description: FK to res_currency.
        tests: [not_null]
      - name: company_id
        description: Rates are company-specific; company 1 (Wingtra AG, base CHF) is the one used for CHF conversions.
      - name: rate_date
        description: Effective date of the rate. Rename of Odoo `name`.
        tests: [not_null]
      - name: rate
        description: Foreign units per 1 CHF (for company 1). Divide foreign amounts by this to get CHF.
        tests: [not_null]

  - name: sale_order
    description: |
      Cleaned Odoo sale order headers. One row per SO across all states (draft / sent / sale / cancel).
      Carries Wingtra's custom shipment fields: `cleared_date` (Odoo `date_cleared`, customs clearance),
      `pickup_date`, `actual_arrival_date`, `order_type`, and `legacy_shipment_ids` (Odoo `legacy_wingtra`).
      CEE (company_id=8) is filtered out per project policy; AG (1), Corp (9), and NULL-company rows are kept.
      Known quirk: `cleared_date` had an entry gap from April 2026 (backfilled, but recent months sit at
      88-100% coverage) and did not carry over for orders merged during the 2025 migration.
    columns:
      - name: sale_order_id
        description: Primary key. Odoo `sale_order.id`.
        tests: [not_null, unique]
      - name: customer_partner_id
        description: FK to res_partner. May point at a sub-record (delivery/invoice contact); OL walks to the company header.
        tests: [not_null]
      - name: salesperson_user_id
        description: FK to res_users. Odoo `user_id`.
      - name: company_id
        description: Selling entity. 1 = Wingtra AG, 9 = Wingtra Corp. (8 = CEE is filtered out).
      - name: currency_id
        description: FK to res_currency. Order amounts are in this currency.
      - name: ordered_at
        description: Order confirmation timestamp. Odoo `date_order`.
      - name: promised_delivery_at
        description: Delivery date promised to the customer. Odoo `commitment_date`.
      - name: first_delivery_at
        description: Timestamp of the first effective delivery. Odoo `effective_date`.
      - name: cleared_date
        description: Customs clearance date (start of the shipment lead time). Odoo custom `date_cleared`. NULL for software/service-only orders, most merged orders, and a small entry-lag tail.
      - name: pickup_date
        description: Date the shipment was picked up (end of the shipment lead time). Wingtra custom field.
      - name: actual_arrival_date
        description: Delivery/arrival date. Alternative lead-time endpoint used in earlier analyses.
      - name: sale_order_name
        description: SO number shown to users (e.g. S08043).
      - name: sale_order_state
        description: Odoo workflow state. `sale` = confirmed order.
        tests:
          - accepted_values:
              arguments:
                values: ['draft', 'sent', 'sale', 'cancel']
      - name: order_type
        description: Wingtra custom commercial classification. NULL on older orders.
        tests:
          - accepted_values:
              arguments:
                values: ['paid', 'under_warranty', 'internal_use', 'free_material', 'exception_booking']
      - name: legacy_shipment_ids
        description: Comma-separated legacy shipment ids from the 2025 migration (Odoo `legacy_wingtra`). More than one id means the SO was merged from several legacy shipments.
      - name: amount_total
        description: Order total incl. tax, in `currency_id` currency.

  - name: sale_order_line
    description: |
      Cleaned Odoo sale order lines. One row per line, including display-only rows
      (`display_type` = line_section / line_note) which carry no product; downstream layers filter those.
      CEE (company_id=8) is filtered out, matching sale_order.
    columns:
      - name: sale_order_line_id
        description: Primary key. Odoo `sale_order_line.id`.
        tests: [not_null, unique]
      - name: sale_order_id
        description: FK to sale_order header. Odoo `order_id`.
        tests: [not_null]
      - name: product_id
        description: FK to product_product. NULL on display-only rows.
      - name: display_type
        description: NULL for real product lines; `line_section` / `line_note` for display-only rows.
        tests:
          - accepted_values:
              arguments:
                values: ['line_section', 'line_note']
      - name: qty_ordered
        description: Ordered quantity in the line UoM. Odoo `product_uom_qty`.
      - name: qty_delivered
        description: Cumulative quantity delivered against this line.
      - name: discount_percent
        description: Line discount in percent (0-100). Odoo `discount`.
