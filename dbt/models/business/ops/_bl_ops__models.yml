version: 2

models:
  - name: consolidated_ctb_kpi
    description: |
      Daily-snapshot, append-only per-SKU table mirroring the CONSOLIDATED
      CTB KPI tab in SC KPI CTB.xlsx (`1sZLfXHke1ZajukDuxRwLfFIfuTVNYuno`).
      One snapshot is appended per dbt run (partitioned on
      `snapshot_date`); consumers wanting "current" must filter to
      `MAX(snapshot_date)`. Columns A..AB follow the sheet; G..O and
      AC/AD are hand-typed in the source sheet and omitted here.
      Grain: (snapshot_date, product_reference).

      Scope rule (confirmed with Jan 2026-06-05): storable + active +
      AG company + not manufactured (no active normal BOM as output) +
      `purchase_ok = TRUE` + has at least one active supplier. If
      `part_number` starts with `/` (R&D obsolete revision) the SKU is
      only kept while on-hand > 0; it drops out once stock is consumed.

      IMM-missing handling: when `take_rate IS NULL`, all 7 IMM-dependent
      columns (`weekly_qty_need`, `imm_odoo_min`, `imm_odoo_max`,
      `imm_daily_demand`, `planned_time_demand`, `balance`,
      `ohi_weeks_coverage`) plus the two status columns and
      `estimated_stock_runway` show the literal string "Take Rate is
      Missing in IMM". Columns are STRING.
    config:
      meta:
        owner: lucille.thomanek
        domain: operations
        layer: bl
        consumer_type: bi_and_reporting
        grain: snapshot_date+product
        synonyms: ['CTB', 'Clear-To-Build', 'CONSOLIDATED CTB KPI', 'material security weekly']
    columns:
      - name: snapshot_date
        description: ISO date when this snapshot was captured. Partitioning column. The table appends one snapshot per dbt run; consumers wanting "current" must filter to MAX(snapshot_date).
        tests:
          - not_null
      - name: product_reference
        description: A — Sheet's "PRODUCT REFERENCE". Odoo product_product.default_code. Unique only within a single `snapshot_date` (see model-level composite uniqueness test).
        tests:
          - not_null
      - name: product_name
        description: B — Sheet's "Product Name". `[product_code] product_name`.
      - name: primary_supplier
        description: C — Sheet header "SUPPLIER". Primary supplier from product_supplierinfo (lowest sequence).
      - name: product_type
        description: D — Sheet's "PRODUCT TYPE". Universe is storable so this is effectively constant `Storable Product`.
      - name: buy_sku_category
        description: E — Sheet's "BUY SKU CATEGORY". From product_template.buy_sku_category.
      - name: prod_cat
        description: F — Sheet's "PROD CAT". product_category.complete_name.
      - name: take_rate
        description: P — IMM take_rate. NULL when SKU is not in IMM. From `ol.products.take_rate`.
      - name: weekly_qty_need
        description: Q — Sheet's "WEEKLY QTY NEED". `take_rate × 18` formatted. STRING because the column emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: imm_odoo_min
        description: R — Sheet's "IMM ODOO MIN". STRING. Direct from `cl.gsheet_inventory_master_ag.odoo_min_qty`; emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: imm_odoo_max
        description: S — Sheet's "IMM ODOO MAX". STRING. Direct from `cl.gsheet_inventory_master_ag.odoo_max_qty`; emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: imm_daily_demand
        description: T — Sheet's "IMM DAILY DEMAND". STRING. Direct from `cl.gsheet_inventory_master_ag.demand_per_day`; emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: planned_time_demand
        description: U — Sheet's "PLANNED TIME DEMAND". STRING. `take_rate × 108`; emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: oh_inv
        description: V — Sheet's "OH INV". SUM(quantity) over ol.stock_at_locations filtered by is_wwh_internal AND company_id=1. 0 when no quants exist. Numeric; independent of IMM.
        tests: [not_null]
      - name: balance
        description: W — Sheet's "BALANCE". V − U. STRING. Emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: expected_arrival_qty
        description: X — Quantity remaining on the open PO line whose planned date is closest to today by absolute distance (past and future compete equally — Jan's rule 2026-06-05). 0 when no open PO. Numeric; independent of IMM.
        tests: [not_null]
      - name: expected_arrival_date
        description: Y — Planned date of the open PO line whose planned date is closest to today by absolute distance. NULL when no open PO.
      - name: status_6wks_outlook
        description: |
          Z — Sheet's "STATUS 6 WKS OUTLOOK". STRING. Outcomes:
            OK | MONITOR | ESCALATE | Take Rate is Missing in IMM
        tests:
          - accepted_values:
              arguments:
                values: ['OK', 'MONITOR', 'ESCALATE', 'Take Rate is Missing in IMM']
      - name: status_6wks_outlook_reason
        description: |
          Verbose sibling of status_6wks_outlook — names which clause of
          the decision tree fired. STRING. Useful for reconciliation and
          for explaining individual SKU statuses to SC owners. Not in
          the sheet.
        tests: [not_null]
      - name: estimated_stock_runway
        description: AA — STRING. ISO week/year (`%V/%G`) when stock-on-hand runs out at IMM daily demand, or "No demand" when take_rate is zero, or "Take Rate is Missing in IMM" when take_rate is null.
      - name: ohi_weeks_coverage
        description: AB — Sheet's "OHI WEEKS COVERAGE". STRING. oh / (take_rate × 18); emits "Take Rate is Missing in IMM" when take_rate is null.
      - name: part_number
        description: R&D PDM number from `product_template.part_number`. A "/" prefix signals R&D obsolete revision; rows with a `/`-prefix and zero on-hand are filtered out by the scope rule.

  - name: bom_material_costs
    description: |
      Weekly snapshot of flattened (leaf-level) BOM material cost. One row per
      (snapshot_week, root product, leaf component); consumption mart behind the
      "BoM Material Cost Monitor" Metabase dashboard (Jan Skret's 2026-07-15
      handover, baseline reproduced against dl_odoo the same day). Two costings
      per component in CHF per base unit: Odoo AVCO (standard_price, company 1)
      and the FIXED primary vendor's pricelist price (vendor_priority = 1,
      fallback lowest sequence; discount applied; purchase UoM -> base unit;
      latest company-1 FX). Covers ALL products with an active BOM — filter
      root_product_code (Jan's 9 SKUs) or root_product_role = 'end_product' in
      dashboards. snapshot_week = Monday of the ISO week; the current week's
      partition is overwritten on every daily run (current week = live state,
      past weeks frozen at their last run). Consumers wanting "current" filter
      to MAX(snapshot_week). Material cost only — no operations, labor, or
      cost_share overheads (totals sit 0-3% below Odoo's stored parent cost);
      subcontracting fees (RAY propellers) are on neither cost side.
    config:
      meta:
        owner: jan.skret
        domain: operations
        layer: bl
        consumer_type: bi_and_reporting
        grain: snapshot_week+root_product+component
        synonyms: ['BoM cost', 'material cost monitor', 'AVCO vs vendor price', 'flattened BOM cost', 'MCC']
        sample_questions:
          - What is the current material cost of WR-BUNDLE at AVCO vs primary vendor prices?
          - How did the vendor-price cost of WR-ADD-SURV61 evolve over the last quarter?
          - Which components moved the most week-over-week?
          - Which BOM components have missing or suspicious prices?
    columns:
      - name: snapshot_week
        description: Monday of the ISO week the snapshot belongs to. Partitioning column. Current week is refreshed daily; past weeks are frozen. Filter MAX(snapshot_week) for "current".
        tests: [not_null]
      - name: root_product_id
        description: Variant id of the product whose BOM tree was exploded. FK to ol.products.
        tests: [not_null]
      - name: component_product_id
        description: Variant id of the leaf component. FK to ol.products. Unique per (snapshot_week, root_product_id).
        tests: [not_null]
      - name: vendor_partner_id
        description: Fixed primary vendor of the component (vendor_priority = 1, fallback lowest sequence). NULL when the component has no supplierinfo line.
      - name: root_product_code
        description: Odoo default_code of the root product. Dashboard filter for the monitored SKUs.
        tests: [not_null]
      - name: root_product_name
        description: Root product display name.
      - name: root_product_role
        description: Manufacturing role of the root from ol.products (end_product / subassembly). Filter end_product for sellable goods.
      - name: component_product_code
        description: Odoo default_code of the leaf component.
      - name: component_product_name
        description: Leaf component display name.
      - name: vendor_name
        description: Primary vendor display name.
      - name: vendor_currency_code
        description: ISO code of the vendor pricelist currency (pre-conversion).
      - name: purchase_uom_name
        description: Purchase UoM the vendor price is quoted in (e.g. 'Roll of 500'). The CHF unit cost is already converted to the base unit.
      - name: price_flags
        description: 'Comma-separated data-quality flags, NULL = clean: missing_vendor_price, zero_vendor_price, missing_avco, zero_avco, expired_vendor_price, extreme_ratio (vendor/AVCO unit ratio > 20x either way). For group-by dashboards; the boolean columns are for filtering.'
      - name: is_vendor_price_missing
        description: Component has no supplierinfo line at all.
        tests: [not_null]
      - name: is_vendor_price_zero
        description: Primary vendor price is exactly 0 (e.g. Bossard screws priced via framework agreements).
        tests: [not_null]
      - name: is_vendor_price_expired
        description: The picked pricelist line has date_end in the past. The price is still used (better than none) but flagged.
        tests: [not_null]
      - name: is_avco_missing
        description: No company-1 AVCO on the component (never receipted at Wingtra AG, e.g. 1474).
        tests: [not_null]
      - name: is_avco_zero
        description: Company-1 AVCO is exactly 0.
        tests: [not_null]
      - name: is_extreme_ratio
        description: Vendor and AVCO unit costs differ by more than 20x either way — usually a pack-price pricelist error.
        tests: [not_null]
      - name: qty_per_unit
        description: Total qty of the leaf component consumed per 1 unit of root, summed across all BOM paths.
        tests: [not_null]
      - name: avco_unit_cost_chf
        description: Odoo AVCO per base unit (product_product.standard_price, company 1, CHF).
      - name: vendor_price_purchase_uom
        description: Discounted primary-vendor price in the original currency, per purchase UoM (as quoted).
      - name: vendor_unit_cost_chf
        description: Discounted primary-vendor price converted to CHF per base unit (purchase-UoM factors + latest company-1 FX).
      - name: avco_line_cost_chf
        description: qty_per_unit * avco_unit_cost_chf. Sum per root for the AVCO material cost of one unit.
      - name: vendor_line_cost_chf
        description: qty_per_unit * vendor_unit_cost_chf. Sum per root for the primary-vendor material cost of one unit.

  - name: shipment_lead_times
    description: |
      One row per confirmed Wingtra AG customer sale order with a pickup date (AG-only scope and
      Wingtra Corp. intercompany exclusion per Janine's 2026-07-10 sign-off). Consumption mart behind
      the shipment lead-time dashboard. The KPI (per Janine Jampen's 2026-06-30 handover, updated in
      the 2026-07-07 review, all decisions signed off 2026-07-10): a shipment is on target when picked
      up within 14 calendar days of customs clearance (`cleared_date` -> `pickup_date`, calendar days).
      Software/service-only orders (licences, subscriptions, memberships, tariff surcharges,
      service-level packages) are excluded — they never physically ship (2026-07-07 review decision).
      Merged orders (2025 migration) recover a missing clearance date from their cancelled source
      orders via `legacy_shipment_ids`: earliest source clearance wins, so the lead time reflects the
      goods that waited longest. Orders without a
      clearance date stay in the model so dashboards can compute coverage; `missing_clearance_reason`
      explains the gap. Negative lead times are kept but excluded from the on-target flags via
      `has_valid_lead_time`. Bucket trends by pickup week/month, not clearance week (clearance lags
      pickups). Refreshed daily after the Odoo raw load.
    config:
      meta:
        owner: lucille.thomanek
        domain: operations
        layer: bl
        consumer_type: bi_and_reporting
        grain: sale_order
        synonyms: ['shipment lead time', 'cleared to pickup', 'lead time KPI', 'on-time shipment']
        sample_questions:
          - What percentage of shipments were picked up within 14 days of clearance this year?
          - What is the median shipment lead time by pickup week?
          - Which shipments took longer than 30 days from clearance to pickup?
          - How many pickups are missing a clearance date, and why?
    columns:
      - name: sale_order_id
        description: Primary key. FK to `ol.sale_orders`.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('sale_orders')
                field: sale_order_id
      - name: customer_organization_id
        description: FK to `ol.organizations`. NULL/dangling for a few portal-login individuals (see sale_orders).
      - name: company_id
        description: Selling entity id. 1 = Wingtra AG, 9 = Wingtra Corp.
      - name: cleared_date
        description: |
          Customs clearance date — lead-time start. For merged orders that lost their own date, this is
          the earliest clearance date of the cancelled source orders (`is_cleared_date_recovered`).
          NULL cases are explained by missing_clearance_reason.
      - name: pickup_date
        description: Pickup date — lead-time end. Never NULL (scope filter).
        tests: [not_null]
      - name: pickup_week
        description: Monday-start week of pickup_date. Use for weekly trends.
      - name: pickup_month
        description: First day of the pickup month.
      - name: pickup_year
        description: Calendar year of pickup_date.
      - name: sale_order_name
        description: SO number (e.g. S08043).
      - name: order_type
        description: Wingtra commercial classification (paid / under_warranty / internal_use / free_material / exception_booking). NULL on older orders.
      - name: customer_name
        description: Customer organization name.
      - name: selling_entity
        description: Human-readable selling entity label derived from company_id. Always 'Wingtra AG' since the AG-only scope decision (2026-07-10).
        tests:
          - accepted_values:
              arguments:
                values: ['Wingtra AG']
      - name: destination
        description: Free-text shipping destination.
      - name: legacy_shipment_ids
        description: Comma-separated legacy shipment ids; more than one = merged SO.
      - name: merged_source_sale_orders
        description: |
          For merged orders — comma-separated SO numbers of the cancelled source orders the shipment
          was combined from (matched via legacy_shipment_ids). NULL for non-merged orders and merged
          orders whose sources could not be resolved.
      - name: missing_clearance_reason
        description: |
          Why cleared_date is NULL: 'merged order — sources not recoverable' (merged in the 2025
          migration and no cancelled source order carries a clearance date) or 'unexplained' (entry
          lag — worth checking in Odoo). NULL when cleared_date is present. Software/service-only
          orders are excluded from the model entirely since the 2026-07-07 review.
        tests:
          - accepted_values:
              arguments:
                values: ['merged order — sources not recoverable', 'unexplained']
      - name: has_physical_goods
        description: At least one order line is a physical good. False only for orders without product lines (software/service-only orders are excluded from the model).
        tests: [not_null]
      - name: is_merged_order
        description: SO merged from several legacy shipments during the 2025 migration.
        tests: [not_null]
      - name: is_cleared_date_recovered
        description: cleared_date was taken from the cancelled source orders because the merged SO lost its own (earliest source clearance).
        tests: [not_null]
      - name: has_cleared_date
        description: cleared_date present. Weekly coverage = share of pickups with this true; below 60% the week's stats are unreliable.
        tests: [not_null]
      - name: has_valid_lead_time
        description: Both dates present and lead time >= 0. The denominator for on-target percentages.
        tests: [not_null]
      - name: is_negative_lead_time
        description: Pickup before clearance — data error, excluded from KPI stats, count reported separately.
        tests: [not_null]
      - name: is_within_14_days
        description: On target — picked up within 14 calendar days of clearance. False when lead time is missing or negative; divide by has_valid_lead_time counts.
        tests: [not_null]
      - name: is_within_7_days
        description: Picked up within 7 calendar days of clearance. Same denominator rule as is_within_14_days.
        tests: [not_null]
      - name: lead_time_days
        description: pickup_date - cleared_date in calendar days. NULL when cleared_date missing; negative on data errors. Dashboard shows median and average side by side; median is the steering number — long-tail outliers (100-518 days) inflate averages.

  - name: unconfirmed_deliveries
    description: |
      One row per outgoing delivery line item on a sale order that HubSpot says is Shipped/Canceled
      but that still has an open (assigned/draft) Odoo delivery. Wingtra AG only. Behind the ops
      dashboard used to clean these up in Odoo (Marco Schicker's 2026-07-20 handover). Line
      quantity/amount comes from the delivery's own move quantity, not the SO line's total ordered
      quantity, since a line can span several partial deliveries. `is_price_anomaly` catches lines
      where price_unit combined with an out-of-range discount produces a nonsensical negative
      amount — exclude these from any SUM(amount_excl_tax) rollup, they stay in the model so they
      remain visible for cleanup. Snapshot as of the last Odoo->BigQuery sync, not real-time.
    config:
      meta:
        owner: lucille.thomanek
        domain: operations
        layer: bl
        consumer_type: bi_and_reporting
        grain: delivery_line_item
        synonyms: ['unconfirmed delivery', 'open delivery on closed order', 'unreconciled shipment']
        sample_questions:
          - Which shipped or cancelled sale orders still have an open delivery in Odoo?
          - What is the total value of unconfirmed deliveries by customer?
          - How many delivery lines have a price anomaly?
    columns:
      - name: sale_order_id
        description: FK to `ol.sale_orders`.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('sale_orders')
                field: sale_order_id
      - name: picking_id
        description: FK to `ol.deliveries` — the open outgoing delivery.
        tests: [not_null]
      - name: sale_order_line_id
        description: FK to `ol.sale_order_lines`. NULL if the delivered move has no matching SO line.
      - name: sale_order_name
        description: SO number (e.g. S08043).
      - name: shipment_status_hubspot
        description: HubSpot shipment status that qualified this order (Shipped or Canceled).
        tests:
          - not_null
      - name: odoo_sale_order_state
        description: Odoo's own SO workflow state, for comparison against the HubSpot status.
      - name: delivery_number
        description: Outgoing delivery number (e.g. WWH/OUT/05543).
      - name: delivery_state
        description: Odoo picking state. Always 'assigned' or 'draft' by construction.
        tests:
          - accepted_values:
              arguments:
                values: ['assigned', 'draft']
      - name: item
        description: Product name. Falls back to 'product_id <id>' when the move has no resolvable product name.
      - name: is_price_anomaly
        description: TRUE when price_unit * (1 - discount/100) is negative — a data-entry error (seen on duplicate "(copy)" products), not a real negative amount. Exclude from totals, don't drop the row.
        tests: [not_null]
      - name: qty_delivered
        description: Quantity on this delivery's move — not the SO line's total ordered quantity.
      - name: amount_excl_tax
        description: qty_delivered * price_unit * (1 - discount/100), rounded. Currency varies per order (see `currency`) — never sum across orders without grouping by currency.
