name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check repository structure
        run: bash scripts/ci/check_repo_structure.sh

      - name: Check for local secrets and generated files
        run: bash scripts/ci/check_no_local_artifacts.sh

      - name: Check shell syntax
        run: bash scripts/ci/check_shell_syntax.sh

      - name: Check Python syntax
        run: python -m compileall -q pipelines

      - name: Build source pipeline Docker images
        run: bash scripts/ci/check_docker_builds.sh
